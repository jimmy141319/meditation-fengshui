<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Shichen Calm｜MP3 Fix</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:#081222;color:#fff}
.wrap{max-width:720px;margin:0 auto;padding:24px 16px 40px}
h1{margin:0 0 8px;font-size:40px}
.sub{color:#cbd5e1;line-height:1.6;margin-bottom:20px}
.card{background:#0f1d35;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:20px;margin-bottom:16px}
.time{font-size:52px;font-weight:800;margin:8px 0 16px}
.mode{font-size:30px;font-weight:800;margin:0 0 8px}
.muted{color:#cbd5e1}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
button{min-height:56px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:#162847;color:#fff;font-size:22px;font-weight:800}
button.primary{background:linear-gradient(135deg,#7dd3fc,#c4b5fd);color:#041220;border:0}
.status{padding:16px;border-radius:18px;background:#10283a;border:1px solid rgba(134,239,172,.18);line-height:1.6}
.list{padding-left:20px;line-height:1.8}
.tag{display:inline-block;padding:8px 12px;border-radius:999px;background:#172b48;margin-right:8px;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Shichen Calm</h1>
  <div class="sub">MP3 修正版。這次只做一件事：<b>把 WAV 換成 MP3，證明 iPhone / Safari / GitHub Pages 可以播本地音檔。</b></div>
  <div class="card">
    <div class="muted">現在時間</div>
    <div id="timeNow" class="time">--:--</div>
    <div id="modeNow" class="mode">--</div>
    <div id="descNow" class="muted">--</div>
    <div style="margin-top:14px">
      <span id="fileTag" class="tag">audio/--</span>
      <span id="freqTag" class="tag">-- Hz</span>
      <span id="pulseTag" class="tag">-- BPM</span>
    </div>
    <div class="buttons">
      <button id="playBtn" class="primary">開始播放</button>
      <button id="pauseBtn">暫停播放</button>
    </div>
  </div>
  <div id="status" class="status">尚未播放。請按「開始播放」。</div>
  <div class="card">
    <div class="muted">這次驗證點</div>
    <ul class="list">
      <li>GitHub Pages 能載入 mp3</li>
      <li>iPhone Safari 按一下能播放</li>
      <li>可暫停</li>
      <li>時段切換可換檔</li>
    </ul>
  </div>
  <audio id="player" playsinline preload="auto" loop></audio>
</div>
<script>
const MODES = [
  { start:23, end:7, title:'夜間模式', desc:'夜間 MP3 測試', file:'audio/night.mp3', hz:174, bpm:8 },
  { start:7, end:11, title:'晨間模式', desc:'早上 MP3 測試', file:'audio/morning.mp3', hz:220, bpm:11 },
  { start:11, end:15, title:'午間模式', desc:'中午 MP3 測試', file:'audio/noon.mp3', hz:261, bpm:13 },
  { start:15, end:23, title:'傍晚模式', desc:'傍晚 MP3 測試', file:'audio/evening.mp3', hz:329, bpm:12 }
];
const els = {
  timeNow: document.getElementById('timeNow'),
  modeNow: document.getElementById('modeNow'),
  descNow: document.getElementById('descNow'),
  fileTag: document.getElementById('fileTag'),
  freqTag: document.getElementById('freqTag'),
  pulseTag: document.getElementById('pulseTag'),
  status: document.getElementById('status'),
  player: document.getElementById('player'),
  playBtn: document.getElementById('playBtn'),
  pauseBtn: document.getElementById('pauseBtn')
};
let currentMode = null;
function matchMode(hour){
  for(const m of MODES){
    if(m.start < m.end){
      if(hour >= m.start && hour < m.end) return m;
    } else {
      if(hour >= m.start || hour < m.end) return m;
    }
  }
  return MODES[0];
}
function render(){
  const now = new Date();
  currentMode = matchMode(now.getHours());
  els.timeNow.textContent = now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false});
  els.modeNow.textContent = currentMode.title;
  els.descNow.textContent = currentMode.desc;
  els.fileTag.textContent = currentMode.file;
  els.freqTag.textContent = currentMode.hz + ' Hz';
  els.pulseTag.textContent = currentMode.bpm + ' BPM';
  if(!els.player.src || !els.player.src.endsWith(currentMode.file)){
    els.player.src = currentMode.file;
    els.player.load();
    els.status.textContent = '已載入：' + currentMode.file + '。現在請按「開始播放」。';
  }
}
async function playAudio(){
  try{
    if(!els.player.src){
      els.player.src = currentMode.file;
      els.player.load();
    }
    await els.player.play();
    els.status.textContent = '播放成功：' + currentMode.file;
  }catch(err){
    els.status.textContent = '播放失敗：' + err.message;
    console.error(err);
  }
}
function pauseAudio(){
  els.player.pause();
  els.status.textContent = '已暫停。';
}
els.playBtn.addEventListener('click', playAudio);
els.pauseBtn.addEventListener('click', pauseAudio);
els.player.addEventListener('error', ()=> {
  const mediaError = els.player.error;
  els.status.textContent = '音檔錯誤：' + (mediaError ? mediaError.code : 'unknown');
});
render();
setInterval(render,15000);
</script>
</body>
</html>

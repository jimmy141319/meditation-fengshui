<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#030712" />
  <title>找不到頁面 · 時辰靜心</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Serif SC', Georgia, serif;
      background: #030712;
      color: #d0e4f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }

    .glyph {
      font-size: 5rem;
      font-weight: 100;
      color: #4080b0;
      letter-spacing: 0.2em;
      line-height: 1;
      margin-bottom: 24px;
      opacity: 0.7;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: #d0e4f5;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      color: #3a5878;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    p {
      font-size: 0.9rem;
      color: #6a90b8;
      line-height: 1.9;
      margin-bottom: 36px;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 30px;
      background: rgba(64,128,176,0.14);
      border: 1px solid rgba(64,128,176,0.45);
      border-radius: 14px;
      color: #d0e4f5;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      background: rgba(64,128,176,0.28);
      border-color: #4080b0;
      box-shadow: 0 0 24px rgba(64,128,176,0.15);
    }

    .brand {
      margin-top: 48px;
      font-size: 0.68rem;
      color: #3a5878;
      letter-spacing: 0.18em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glyph">迷</div>
    <h1>找不到此頁面</h1>
    <p class="sub">Page Not Found · 404</p>
    <p>
      此頁面不存在或已移動。<br />
      This page does not exist or has been moved.<br />
      請返回靜心主頁。
    </p>
    <a href="./">
      <span>◎</span>
      <span>返回靜心 · Return to Calm</span>
    </a>
    <div class="brand">時辰靜心 · Shichen Calm · NT$99</div>
  </div>
</body>
</html>
